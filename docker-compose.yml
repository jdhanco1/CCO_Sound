version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cco_cms
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload_dev_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d cco_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Payload CMS ────────────────────────────────────────
  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
      target: dev
    container_name: cco-cms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://payload:payload_dev_password@postgres:5432/cco_cms
      PAYLOAD_SECRET: change-me-to-a-random-secret
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      PORT: 3001
    volumes:
      - ./cms:/app
      - cms_node_modules:/app/node_modules
      - cms_media:/app/media
    ports:
      - "3001:3001"

  # ── React Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: cco-frontend
    restart: unless-stopped
    depends_on:
      - cms
    environment:
      VITE_CMS_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  pg_data:
  cms_node_modules:
  cms_media:
  frontend_node_modules:
