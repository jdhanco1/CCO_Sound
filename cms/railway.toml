[build]
  builder           = "DOCKERFILE"
  dockerfilePath    = "Dockerfile"
  dockerBuildTarget = "prod"

[deploy]
  # Use root path — Payload redirects / to /admin which returns 200/302
  # /api/health can fail before DB migration completes on first boot
  healthcheckPath    = "/"
  healthcheckTimeout = 300
  restartPolicyType  = "ON_FAILURE"
  restartPolicyMaxRetries = 3
