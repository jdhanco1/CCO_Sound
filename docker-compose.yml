  #     - "1337:1337"

  # ── React Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: cco-frontend
    restart: unless-stopped
    # depends_on:
    #   - strapi
    environment:
      VITE_STRAPI_URL: http://localhost:1337
      VITE_STRAPI_TOKEN: ""
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  pg_data:
  cms_node_modules:
  strapi_uploads:
  frontend_node_modules:
