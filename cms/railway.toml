[build]
  builder           = "DOCKERFILE"
  dockerfilePath    = "Dockerfile"
  dockerBuildTarget = "prod"

[deploy]
  # Payload CMS exposes a health endpoint at /api/health
  healthcheckPath    = "/api/health"
  healthcheckTimeout = 300
  restartPolicyType  = "ON_FAILURE"
  restartPolicyMaxRetries = 3
