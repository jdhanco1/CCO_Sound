[build]
  builder           = "DOCKERFILE"
  dockerfilePath    = "Dockerfile"
  dockerBuildTarget = "prod"

[deploy]
  # No healthcheck path — Railway considers the deploy healthy once the
  # container starts and stays running. This avoids false failures during
  # Payload's first-boot DB migration.
  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 3
